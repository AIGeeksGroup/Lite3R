<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLY Viewer</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #f8fafc;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #viewer {
        width: 100%;
        height: 100%;
      }

      #status {
        position: fixed;
        left: 16px;
        bottom: 14px;
        padding: 8px 10px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.86);
        color: #334155;
        font-size: 13px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <div id="status">Loading point cloud...</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';

      const container = document.getElementById('viewer');
      const status = document.getElementById('status');
      const params = new URLSearchParams(window.location.search);
      const src = params.get('src') || 'asset/pointcloud_results_8scenes/01_ornate_facade/gt.ply';

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf8fafc);

      const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.001, 1000);
      camera.position.set(0, 0, 3);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      container.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;

      scene.add(new THREE.HemisphereLight(0xffffff, 0x94a3b8, 2.2));

      const loader = new PLYLoader();
      loader.load(
        src,
        (geometry) => {
          geometry.computeBoundingBox();
          geometry.computeVertexNormals();

          const box = geometry.boundingBox;
          const center = new THREE.Vector3();
          const size = new THREE.Vector3();
          box.getCenter(center);
          box.getSize(size);
          geometry.translate(-center.x, -center.y, -center.z);

          const maxDim = Math.max(size.x, size.y, size.z) || 1;
          geometry.scale(2 / maxDim, 2 / maxDim, 2 / maxDim);

          const material = new THREE.PointsMaterial({
            size: 0.006,
            vertexColors: geometry.hasAttribute('color'),
            color: 0x3b82f6,
            sizeAttenuation: true
          });

          const points = new THREE.Points(geometry, material);
          scene.add(points);

          camera.position.set(0, 0, 3);
          controls.target.set(0, 0, 0);
          controls.update();
          status.textContent = 'Drag to rotate, scroll to zoom';
        },
        undefined,
        (error) => {
          console.error(error);
          status.textContent = 'Failed to load point cloud';
        }
      );

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
    </script>
  </body>
</html>
