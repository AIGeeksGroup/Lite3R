# Decisive 5ep test: zero-init proj_lin (the main fix found via
# /tmp/diag_sla_init.py — eye*0.5 was corrupting pretrained behaviour at t=0
# even before any training). Reuses lr=1e-4 (best from prior lr sweep) and
# the clamp-fixed loss. If this run lands abs_rel anywhere near 0.05–0.10
# we have recovered most of the lite quality (vs prior ~0.28 floor).
variant: lite_stage1
output_dir: outputs/vggt_lite_stage1_zeroinit_lr1e4_5ep

model:
  img_size: 518
  patch_size: 14
  embed_dim: 1024
  load_pretrained: true
  pretrained_repo: facebook/VGGT-1B
  keep_ratio: 0.2
  lambda_init: 0.5
  enable_kd: true
  kd_gamma_max: 0.3
  kd_gamma_min: 0.03

data:
  root: datasets/BlendedMVS_lowres/BlendedMVS
  use_dummy: false
  img_per_seq: 2
  img_size: 518
  batch_size: 1
  num_workers: 2

loss:
  camera: {weight: 1.0, loss_type: l1, gamma: 0.6, pose_encoding_type: absT_quaR_FoV, weight_trans: 1.0, weight_rot: 1.0, weight_focal: 0.5}
  depth:  {weight: 1.0, gamma: 1.0, alpha: 0.2, gradient_loss_fn: "", valid_range: 0.95}

optim:
  epochs: 5
  lr: 1.0e-4
  weight_decay: 0.05
  warmup_steps: 100
  grad_clip: 1.0

log_every: 20
save_every: 9999
max_eval_samples: 32
