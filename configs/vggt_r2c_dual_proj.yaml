# R2-C: dual-projection SLA. Activated via env var LITE3R_DUAL_PROJ=1 in the
# launcher (must be set for both train AND eval, since model structure
# changes). With dual-proj on:
#   out = proj_topk(a_topk) + proj_lin(a_lin)
# proj_topk init = identity + small Gaussian (preserves pretrained at t=0).
# proj_lin init = small Gaussian (residual, σ=1e-3).
# Hypothesis: per-channel learnable knob on a_topk lets QAT compensate
# quantisation noise WITHOUT having to drag qkv weights away from
# pretrained — bypassing the failure mode of regular QAT.
variant: lite_stage2
output_dir: outputs/vggt_r2c_dual_proj

model:
  img_size: 518
  patch_size: 14
  embed_dim: 1024
  load_pretrained: true
  pretrained_repo: facebook/VGGT-1B
  keep_ratio: 0.2
  lambda_init: 0.5
  enable_kd: false
  weight_bits: 4
  act_bits: 16
  group_size: 128
  quantize_attn_linear: false

data:
  root: datasets/BlendedMVS_lowres/BlendedMVS
  use_dummy: false
  img_per_seq: 2
  img_size: 518
  batch_size: 1
  num_workers: 2

loss:
  camera: {weight: 1.0, loss_type: l1, gamma: 0.6, pose_encoding_type: absT_quaR_FoV, weight_trans: 1.0, weight_rot: 1.0, weight_focal: 0.5}
  depth:  {weight: 1.0, gamma: 1.0, alpha: 0.2, gradient_loss_fn: "", valid_range: 0.95}

optim:
  epochs: 1
  lr: 1.0e-3
  weight_decay: 0.05
  warmup_steps: 30
  grad_clip: 1.0

log_every: 10
save_every: 9999
max_eval_samples: 32
