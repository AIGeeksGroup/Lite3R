# Variant D: Full QAT, lr=1e-4, 2 epoch.
# Drop trainable_only_proj_lin: backbone (qkv/MLP/heads) W4 weights are
# now trainable through STE. Tests whether lr=1e-4 (10x S1's 1e-5) plus
# 2 epoch (2x S1's 1 epoch) is enough budget for W4 weights to traverse
# the quant grid meaningfully. Theoretical update per step ~1e-5 to 1e-4
# vs grid step ~7e-3, so 226 steps × ~5e-5 mean ≈ 1e-2 cumulative — about
# 1.5x the grid step. Tight but possibly traversable.
variant: lite_stage2
output_dir: outputs/night_D_fullqat_lr1e4_2ep
init_from_stage1: outputs/vggt_keep03_r2a_qat/last.pt
model:
  img_size: 518
  patch_size: 14
  embed_dim: 1024
  load_pretrained: true
  pretrained_repo: facebook/VGGT-1B
  keep_ratio: 0.3
  lambda_init: 0.5
  enable_kd: false
  weight_bits: 4
  act_bits: 8
  group_size: 128
  quantize_attn_linear: true
data:
  root: datasets/BlendedMVS_lowres/BlendedMVS
  use_dummy: false
  img_per_seq: 2
  img_size: 518
  batch_size: 1
  num_workers: 2
loss:
  camera: {weight: 1.0, loss_type: l1, gamma: 0.6, pose_encoding_type: absT_quaR_FoV, weight_trans: 1.0, weight_rot: 1.0, weight_focal: 0.5}
  depth:  {weight: 1.0, gamma: 1.0, alpha: 0.2, gradient_loss_fn: "", valid_range: 0.95}
optim:
  epochs: 2
  lr: 1.0e-4
  weight_decay: 0.05
  warmup_steps: 60
  grad_clip: 1.0
log_every: 10
save_every: 9999
max_eval_samples: 32
