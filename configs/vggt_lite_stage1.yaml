# VGGT Lite Stage-1: SLA replacement + dense-attention distillation.
# Finetune from HF pretrained so the SLA student starts from a useful init AND
# the distillation teacher sees the actual pretrained attention distribution.
# img_per_seq dropped from 4 → 2 because Stage-1 carries both teacher and
# student forwards in memory (KD).
variant: lite_stage1
output_dir: outputs/vggt_lite_stage1

model:
  img_size: 518
  patch_size: 14
  embed_dim: 1024
  load_pretrained: true
  pretrained_repo: facebook/VGGT-1B
  # SLA settings
  keep_ratio: 0.2
  lambda_init: 0.5
  # KD weights (cosine decay over training)
  enable_kd: true
  kd_gamma_max: 0.1
  kd_gamma_min: 0.01

data:
  root: datasets/BlendedMVS_lowres/BlendedMVS
  use_dummy: false
  img_per_seq: 2
  img_size: 518
  batch_size: 1
  num_workers: 2

loss:
  camera:
    weight: 1.0
    loss_type: l1
    gamma: 0.6
    pose_encoding_type: absT_quaR_FoV
    weight_trans: 1.0
    weight_rot: 1.0
    weight_focal: 0.5
  depth:
    weight: 1.0
    gamma: 1.0
    alpha: 0.2
    gradient_loss_fn: ""
    valid_range: 0.95

optim:
  epochs: 5
  lr: 5.0e-6
  weight_decay: 0.05
  warmup_steps: 100
  grad_clip: 1.0

log_every: 10
save_every: 500
max_eval_samples: 32
