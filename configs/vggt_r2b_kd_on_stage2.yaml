# R2-B: enable KD in stage-2 QAT (γ_max=0.1). Hypothesis: KD against the dense
# pretrained teacher anchors qkv/MLP/head close to pretrained representation,
# preventing the "drift toward constant-prediction attractor" failure mode
# we see in pure-supervised QAT. The lite student attention output differs
# from teacher only via top-k truncation + zero-init proj_lin residual at
# t=0, so KD pull is small initially and grows naturally as proj_lin awakens.
variant: lite_stage2
output_dir: outputs/vggt_r2b_kd_on_stage2

model:
  img_size: 518
  patch_size: 14
  embed_dim: 1024
  load_pretrained: true
  pretrained_repo: facebook/VGGT-1B
  keep_ratio: 0.2
  lambda_init: 0.5
  enable_kd: true       # ← R2-B flag (NEW: stage_2 setup_kd now respects this)
  kd_gamma_max: 0.1
  kd_gamma_min: 0.01
  weight_bits: 4
  act_bits: 16
  group_size: 128
  quantize_attn_linear: false

data:
  root: datasets/BlendedMVS_lowres/BlendedMVS
  use_dummy: false
  img_per_seq: 2
  img_size: 518
  batch_size: 1
  num_workers: 2

loss:
  camera: {weight: 1.0, loss_type: l1, gamma: 0.6, pose_encoding_type: absT_quaR_FoV, weight_trans: 1.0, weight_rot: 1.0, weight_focal: 0.5}
  depth:  {weight: 1.0, gamma: 1.0, alpha: 0.2, gradient_loss_fn: "", valid_range: 0.95}

optim:
  epochs: 1
  lr: 1.0e-3
  weight_decay: 0.05
  warmup_steps: 30
  grad_clip: 1.0

log_every: 10
save_every: 9999
max_eval_samples: 32
