# FP8-aware QAT probe: SLA student + FP8 E4M3 fake-quantized Linear layers.
variant: lite_stage2
output_dir: outputs/da3_fp8_qat_1ep
trainable_only_proj_lin: true
init_from_stage1: outputs/da3_keep03_r2a_qat_w4a8/last.pt
seed: 42
model:
  model_name: da3-large
  load_pretrained: true
  pretrained_repo: depth-anything/DA3-LARGE
  keep_ratio: 0.3
  lambda_init: 0.5
  enable_kd: true
  kd_gamma_max: 0.1
  kd_gamma_min: 0.01
  quant_format: fp8
  fp8_act_quant: true
data:
  root: datasets/BlendedMVS_lowres/BlendedMVS
  use_dummy: false
  img_per_seq: 2
  img_size: 518
  batch_size: 1
  num_workers: 2
loss:
  camera: {weight: 1.0, loss_type: l1, gamma: 0.6, pose_encoding_type: absT_quaR_FoV, weight_trans: 1.0, weight_rot: 1.0, weight_focal: 0.5}
  depth:  {weight: 1.0, gamma: 1.0, alpha: 0.2, gradient_loss_fn: "", valid_range: 0.95}
optim:
  epochs: 1
  lr: 1.0e-3
  weight_decay: 0.05
  warmup_steps: 30
  grad_clip: 1.0
log_every: 10
save_every: 9999
max_eval_samples: 32
