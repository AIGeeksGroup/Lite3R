# E1 ablation: same as vggt_original but lr=5e-5 (10x). Tests whether the
# tiny weight change at lr=5e-6 (~0.36% L2) is what's holding finetune back.
variant: original
output_dir: outputs/vggt_original_lr5e5

model:
  img_size: 518
  patch_size: 14
  embed_dim: 1024
  load_pretrained: true
  pretrained_repo: facebook/VGGT-1B

data:
  root: datasets/BlendedMVS_lowres/BlendedMVS
  use_dummy: false
  img_per_seq: 4
  img_size: 518
  batch_size: 1
  num_workers: 2

loss:
  camera:
    weight: 1.0
    loss_type: l1
    gamma: 0.6
    pose_encoding_type: absT_quaR_FoV
    weight_trans: 1.0
    weight_rot: 1.0
    weight_focal: 0.5
  depth:
    weight: 1.0
    gamma: 1.0
    alpha: 0.2
    gradient_loss_fn: ""
    valid_range: 0.95

optim:
  epochs: 5
  lr: 5.0e-5     # 10x of original 5e-6
  weight_decay: 0.05
  warmup_steps: 100
  grad_clip: 1.0

log_every: 10
save_every: 9999  # avoid 13GB mid-training ckpt (disk tight); only final last.pt
max_eval_samples: 32
