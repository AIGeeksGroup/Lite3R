# SK2: Sage retrain + KD γ_max=0.5 + 1 epoch.
# More aggressive KD anchoring than SK1. In token-level setting, γ=0.5 was
# also harmless at 1-ep (0.034 vs F's 0.033). For Sage path which loses
# more attention info, stronger KD anchor may be more helpful.
variant: lite_stage2
output_dir: outputs/sk2_sage_kd05_1ep
trainable_only_proj_lin: true
init_from_stage1: outputs/vggt_keep03_r2a_qat/last.pt
seed: 42
model:
  img_size: 518
  patch_size: 14
  embed_dim: 1024
  load_pretrained: true
  pretrained_repo: facebook/VGGT-1B
  keep_ratio: 0.3
  lambda_init: 0.5
  enable_kd: true
  kd_gamma_max: 0.5
  kd_gamma_min: 0.05
  weight_bits: 4
  act_bits: 8
  group_size: 128
  quantize_attn_linear: true
data:
  root: datasets/BlendedMVS_lowres/BlendedMVS
  use_dummy: false
  img_per_seq: 2
  img_size: 518
  batch_size: 1
  num_workers: 2
loss:
  camera: {weight: 1.0, loss_type: l1, gamma: 0.6, pose_encoding_type: absT_quaR_FoV, weight_trans: 1.0, weight_rot: 1.0, weight_focal: 0.5}
  depth:  {weight: 1.0, gamma: 1.0, alpha: 0.2, gradient_loss_fn: "", valid_range: 0.95}
optim:
  epochs: 1
  lr: 1.0e-3
  weight_decay: 0.05
  warmup_steps: 30
  grad_clip: 1.0
log_every: 10
save_every: 9999
max_eval_samples: 32
