# DA3-Large Stage 2: KD γ=0.1 + S+sk deploy. Counterpart to VGGT sk_kd01_1ep.
# Same recipe as the locked VGGT final: 1-ep + KD γ=0.1, token-level forward at
# train, Sage+smooth_k at deploy (or thu-ml SLA kernel via env LITE3R_TOPK_THUML=1).
variant: lite_stage2
output_dir: outputs/da3_sk_kd01_1ep
trainable_only_proj_lin: true
init_from_stage1: outputs/da3_keep03_r2a_qat_w4a8/last.pt
seed: 42
model:
  model_name: da3-large
  load_pretrained: true
  pretrained_repo: depth-anything/DA3-LARGE
  keep_ratio: 0.3
  lambda_init: 0.5
  enable_kd: true
  kd_gamma_max: 0.1
  kd_gamma_min: 0.01
  weight_bits: 4
  act_bits: 8
  group_size: 128
  quantize_attn_linear: true
data:
  root: datasets/BlendedMVS_lowres/BlendedMVS
  use_dummy: false
  img_per_seq: 2
  img_size: 518
  batch_size: 1
  num_workers: 2
loss:
  camera: {weight: 1.0, loss_type: l1, gamma: 0.6, pose_encoding_type: absT_quaR_FoV, weight_trans: 1.0, weight_rot: 1.0, weight_focal: 0.5}
  depth:  {weight: 1.0, gamma: 1.0, alpha: 0.2, gradient_loss_fn: "", valid_range: 0.95}
optim:
  epochs: 1
  lr: 1.0e-3
  weight_decay: 0.05
  warmup_steps: 30
  grad_clip: 1.0
log_every: 10
save_every: 9999
max_eval_samples: 32
